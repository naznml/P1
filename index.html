const app = document.getElementById("app");
const nav = document.getElementById("nav");
function txt(k,r){return LANG === "k" ? k : r;}
function updateStaticText(){
  document.documentElement.lang = LANG === "k" ? "kk" : "ru";
  document.getElementById("btnK").classList.toggle("active", LANG === "k");
  document.getElementById("btnR").classList.toggle("active", LANG === "r");
  document.getElementById("mainTitle").innerHTML = txt("Жүндібаева Т.Н.<br>Отбасы педагогикасы", "Жундибаева Т.Н.<br>Семейная педагогика");
  document.getElementById("heroSub").textContent = txt("Отбасы педагогикасы бойынша дайындық сайты", "Сайт подготовки по семейной педагогике");
  document.getElementById("noticeText").textContent = txt("Бұл сайттың ресми авторы — @elnazm_ln (Назерке). Бұл материалды тек автордың өзі ғана сата алады.", "Официальный автор сайта — @elnazm_ln (Назерке). Продавать этот материал может только автор.");
  document.getElementById("payText").textContent = txt("Төлем: Kaspi, Halyk, Freedom — НАЗЕРКЕ М.", "Оплата: Kaspi, Halyk, Freedom — НАЗЕРКЕ М.");
}
function renderNav(){
  nav.innerHTML = DATA.map((s,i)=>'<a onclick="renderSection('+i+')">'+(i+1)+'. '+txt(s.titleK.replace(/^\d+-бөлім\.\s*/,''), s.titleR.replace(/^Раздел\s*\d+\.\s*/,''))+'</a>').join('');
}
function setLang(lang){LANG=lang;updateStaticText();renderNav();if(window.currentSectionIndex===undefined){renderHome();}else{renderSection(window.currentSectionIndex,false);}}
function renderHome(){
  window.currentSectionIndex=undefined; updateStaticText(); renderNav();
  app.innerHTML='<section class="head"><h2>'+txt("Бөлімдер", "Разделы")+'</h2><div class="desc">'+txt("Әр бөлімде сұрақтар, жақын әрі бір тақырыптағы жауап нұсқалары және нәтиже көрсетілгеннен кейін ашылатын түсіндірмелер берілген.", "В каждом разделе есть вопросы, близкие по теме варианты ответов и объяснения, которые открываются после показа результата.")+'</div></section><section class="grid">'+DATA.map((s,i)=>'<button type="button" class="card book-card" onclick="renderSection('+i+')"><div class="card-num">'+(i+1)+'</div><h2>'+txt(s.titleK,s.titleR)+'</h2><p>'+txt(s.descK||'',s.descR||'')+'</p><span>'+s.questions.length+' '+txt("сұрақ", "вопросов")+'</span></button>').join('')+'</section><div class="footer">© @elnazm_ln</div>';
}
function renderSection(index,doScroll=true){
  window.currentSectionIndex=index; updateStaticText(); renderNav();
  const section=DATA[index];
  app.innerHTML='<button type="button" class="btn secondary" onclick="renderHome()">← '+txt("Басты бетке қайту", "Вернуться на главную")+'</button><section class="card"><div class="head"><h2>'+txt(section.titleK,section.titleR)+'</h2><div class="desc">'+txt(section.descK||'',section.descR||'')+'</div></div><form id="quizForm">'+section.questions.map((q,qi)=>'<div class="q" id="q-'+qi+'"><div class="qtag">'+q.level+' • '+(qi+1)+'/'+section.questions.length+'</div><div class="qtitle">'+txt(q.qK,q.qR)+'</div>'+q.options.map(opt=>'<label class="opt" data-q="'+qi+'" data-id="'+opt.id+'"><input type="'+(q.type==="multi"?"checkbox":"radio")+'" name="q'+qi+'" value="'+opt.id+'"><span>'+txt(opt.k,opt.r)+'</span></label>').join('')+'<div class="ans" id="ex-'+qi+'" style="display:none"></div></div>').join('')+'<button type="button" class="btn" onclick="checkSection('+index+')">'+txt("Нәтижені көрсету", "Показать результат")+'</button></form><div id="resultBox" class="result" style="display:none"></div></section>';
  if(doScroll) window.scrollTo({top:0,behavior:"smooth"});
}
function arraysEqual(a,b){const aa=[...a].sort();const bb=[...b].sort();return aa.length===bb.length && aa.every((v,i)=>v===bb[i]);}
function checkSection(index){
  const section=DATA[index]; let score=0;
  section.questions.forEach((q,qi)=>{
    const selected=[...document.querySelectorAll('input[name="q'+qi+'"]:checked')].map(i=>i.value);
    const correct=q.a;
    const ok=arraysEqual(selected,correct); if(ok) score++;
    q.options.forEach(opt=>{const label=document.querySelector('.opt[data-q="'+qi+'"][data-id="'+opt.id+'"]'); if(!label)return; label.classList.remove('right','wrong'); label.classList.add('locked'); const input=label.querySelector('input'); if(input)input.disabled=true; if(correct.includes(opt.id)){label.classList.add('right');}else if(selected.includes(opt.id)){label.classList.add('wrong');}});
    const ex=document.getElementById('ex-'+qi); const correctText=q.options.filter(o=>correct.includes(o.id)).map(o=>txt(o.k,o.r)).join('; ');
    ex.style.display='block'; ex.className='ans '+(ok?'ok':'bad');
    ex.innerHTML='<div class="'+(ok?'oktxt':'badtxt')+'">'+(ok?txt('Дұрыс','Правильно'):txt('Қате','Неверно'))+'</div><div class="ex"><b>'+txt('Дұрыс жауап:', 'Правильный ответ:')+'</b> '+correctText+'</div><div class="ex">'+txt(q.exK,q.exR)+'</div><div class="source"><b>'+txt('Дереккөз:', 'Источник:')+'</b> '+txt(q.sourceK||'',q.sourceR||'')+'</div>';
  });
  const percent=Math.round((score/section.questions.length)*100); const resultBox=document.getElementById('resultBox'); resultBox.style.display='block'; resultBox.innerHTML='<div class="summary"><h2>'+txt('Нәтиже','Результат')+'</h2><p><b>'+score+'</b> / '+section.questions.length+'</p><p>'+percent+'%</p></div>'; resultBox.scrollIntoView({behavior:'smooth',block:'start'});
}
renderHome();
